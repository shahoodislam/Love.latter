<!DOCTYPE html>
<html>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            overflow: hidden;
        }

        .box {
            text-align: center;
            color: white;
            animation: fadeIn 2s ease;
        }

        h1 {
            font-size: 32px;
        }

        p {
            margin-bottom: 40px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            background: white;
            color: #ff4d6d;
            font-size: 16px;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>
