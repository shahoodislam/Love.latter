<!DOCTYPE html>
<html>
<head>
    <title>My Moteee ❤️</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;
            background: linear-gradient(135deg, #0f0f1a, #2b1b2e);
            overflow: hidden;
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 30px;
            border-radius: 20px;
            max-width: 600px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: #ff4d6d;
        }

        #text {
            min-height: 200px;
            text-align: left;
            white-space: pre-line;
            line-height: 1.3;
            margin: 10px 0;
        }

        .heart {
            position: absolute;
            color: #ff4d6d;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% {transform: translateY(100vh); opacity: 1;}
            100% {transform: translateY(-10vh); opacity: 0;}
        }

        /* 💌 Reply button FIXED */
        #replyBtn {
            display: none;
            margin-top: 15px;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>

<body>

<!-- 🎵 Soft music -->
<audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <h1>For my wife Alisha ❤️ my moteee</h1>

    <div id="text"></div>

    <!-- 💌 Reply button -->
    <button id="replyBtn" onclick="goReply()">
        Reply me if you forgive me 💌
    </button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

let msg = `
My moteee… my wife Alisha ❤️

Please forgive me…

I am really sorry for my anger that day.

I regret every word I said to you.

You didn’t deserve that at all.

You are my peace, my smile, my everything.

Without you, my world feels empty.

I miss you every moment.

I just want you back, my moteee.

You are my heart, my life, my everything.

I promise I will change.

Please forgive me my wife ❤️

I love you… forever.`;

let i = 0;

function type(){
    if(i < msg.length){
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;
        setTimeout(type, 80); // 🔥 SLOWER typing speed
    } else {
        // 💌 show button AFTER message ends
        document.getElementById("replyBtn").style.display = "inline-block";
    }
}

type();

/* ❤️ hearts */
setInterval(() => {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = "18px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 500);

});

/* 🔁 open reply page */
function goReply(){
    window.location.href = "reply.html";
}
</script>

</body>
</html>
